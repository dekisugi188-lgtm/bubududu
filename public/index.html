  right:16px;
  width:96px;
  height:130px;
  border-radius:14px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.55);

  height:100%;
  object-fit:cover;
  border-radius:0;
  background:#1e293b;

  transform:scaleX(-1);

<script>
const socket = io();
window.addEventListener("pagehide", () => {
    if (room) {
        socket.emit("leave-room");
    }
});

window.addEventListener("beforeunload", () => {
    if (room) {
        socket.emit("leave-room");
    }
});
let room="";

function scrollToBottom(){
  const messages=document.getElementById("messages");
  messages.scrollTop=messages.scrollHeight;
}

function join(){
  room=document.getElementById("room").value;

  if(!room) return;

  socket.emit("join-room",room);

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";
}

function send(){
  const input=document.getElementById("msg");

  if(!input.value.trim()) return;

  socket.emit("message",input.value);

  add("Me",input.value);

  input.value="";
  input.focus();
}

document.getElementById("msg").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    send();
  }
});

function typing(){
  socket.emit("typing");
}

socket.on("message",(msg)=>{
  add("Her",msg);
});

socket.on("typing",()=>{
  document.getElementById("typing").innerText="Typing...";

  setTimeout(()=>{
    document.getElementById("typing").innerText="";
  },1000);
});

socket.on("status",(s)=>{

  const status=document.getElementById("onlineStatus");

  if(s==="online"){
    status.innerHTML="🟢 Partner Online";
  }else{
    status.innerHTML="⚫ Partner Offline";
  }

});

function add(user,text){

  const div=document.createElement("div");

  div.classList.add("message");

  if(user==="Me"){
    div.classList.add("me");
  }else{
    div.classList.add("her");
  }

  const time=new Date().toLocaleTimeString([],{
  hour:"2-digit",
  minute:"2-digit"
});

div.innerHTML=`
<b>${user}</b><br>
${text}
<div style="
font-size:11px;
opacity:.7;
text-align:right;
margin-top:5px;">
${time}
</div>
`;

  document.getElementById("messages").appendChild(div);

  scrollToBottom();
}

document.getElementById("imageInput").addEventListener("change",async function(){

  const file=this.files[0];

  if(!file) return;

  const formData=new FormData();
  formData.append("image",file);
  formData.append("room",room);

  const res=await fetch("/upload-image",{
    method:"POST",
    body:formData
  });

  const data=await res.json();

  addImage("Me",data.url);

  socket.emit("image",data.url);
});

function addImage(user,rawUrl){

  const url = rawUrl + "?room=" + encodeURIComponent(room);

  const div=document.createElement("div");

  div.classList.add("message");

  if(user==="Me"){
    div.classList.add("me");
  }else{
    div.classList.add("her");
  }

  div.innerHTML=`
  <b>${user}</b><br>
  <img src="${url}" onclick="openImage('${url}')">
  `;

  document.getElementById("messages").appendChild(div);

  scrollToBottom();
}

socket.on("image",(url)=>{
  addImage("Her",url);
});

let recorder;
let chunks=[];
let isRecording=false;

async function startRecording(){

  const btn=document.getElementById("recordBtn");

  if(!isRecording){

    const stream=await navigator.mediaDevices.getUserMedia({
      audio:true
    });

    recorder=new MediaRecorder(stream);

    chunks=[];

    recorder.ondataavailable=(e)=>{
      chunks.push(e.data);
    };

    recorder.start();

    isRecording=true;
    btn.innerText="🔴 Recording...";

  }else{

    recorder.stop();

    recorder.onstop=async()=>{

      const blob=new Blob(chunks,{type:"audio/webm"});

      const formData=new FormData();

      formData.append("audio",blob,"voice.webm");
      formData.append("room",room);

      const res=await fetch("/upload-audio",{
        method:"POST",
        body:formData
      });

      const data=await res.json();

      addAudio("Me",data.url);

      socket.emit("audio",data.url);
    };

    isRecording=false;
    btn.innerText="🎤 Start Recording";
  }
}

function addAudio(user,rawUrl){

  const url = rawUrl + "?room=" + encodeURIComponent(room);

  const div=document.createElement("div");

  div.classList.add("message");

  if(user==="Me"){
    div.classList.add("me");
  }else{
    div.classList.add("her");
  }

  const time=new Date().toLocaleTimeString([],{
    hour:"2-digit",
    minute:"2-digit"
  });

  div.innerHTML=`
  
  <div style="
  font-size:13px;
  margin-bottom:6px;">
  🎤 Voice Message
  </div>

  <audio controls
  style="
  width:100%;
  height:38px;">
    <source src="${url}">
  </audio>

  <div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
  font-size:11px;
  opacity:0.8;">

    <span>${time}</span>

    <details>
      <summary style="
      cursor:pointer;
      list-style:none;
      font-size:16px;">
      ⋮
      </summary>

      <a href="${url}" download
      style="
      text-decoration:none;
      color:white;">
      ⬇ Download
      </a>
    </details>

  </div>
  
  `;

  document.getElementById("messages").appendChild(div);

  scrollToBottom();
}

socket.on("audio",(url)=>{
  addAudio("Her",url);
});

// ===================== WebRTC CALLING =====================

// NOTE ON TURN: STUN-only setups (like the previous one) only help two peers
// discover their public IP/port. That works fine on a LAN or when both sides
// have "easy" NAT types. The moment this app is used over the real internet
// (Render deployment, two different home/mobile networks, carrier-grade NAT,
// symmetric NAT, hotel/campus wifi, etc.) a large fraction of connections
// cannot be established peer-to-peer at all — STUN can't fix that, only a
// TURN relay can. Without TURN, the call can still finish signaling
// (offer/answer/ICE candidates exchanged, "Connected" text shown) while the
// actual media path never comes up, which matches the reported symptom of
// "reaches Connected but no audio/video". The openrelay.metered.ca servers
// below are a free public TURN service suitable for testing — replace them
// with your own TURN credentials (Twilio, Xirsys, metered.ca, coturn, etc.)
// for production use, since free/public TURN has no uptime guarantees.
const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    {
      urls: "turn:openrelay.metered.ca:80",
      username: "openrelayproject",
      credential: "openrelayproject"
    },
    {
      urls: "turn:openrelay.metered.ca:443",
      username: "openrelayproject",
      credential: "openrelayproject"
    },
    {
      urls: "turn:openrelay.metered.ca:443?transport=tcp",
      username: "openrelayproject",
      credential: "openrelayproject"
    }
  ]
};

let localStream = null;
let peerConnection = null;
let pendingOffer = null;
let pendingCallType = null;
let isCaller = false;
let isMuted = false;
let isCameraOff = false;
let currentFacingMode = "user";
let canSwitchCamera = false;

// ---- ICE candidate queueing ----
// Root-cause fix: candidates can legitimately arrive from the other side
// before our RTCPeerConnection exists (e.g. the callee hasn't tapped
// "Accept" yet) or before setRemoteDescription() has completed on our side.
// addIceCandidate() requires a remote description to already be set, so any
// candidate that arrives too early MUST be queued and replayed afterwards
// instead of being silently dropped.
let remoteDescriptionSet = false;
let queuedRemoteCandidates = [];

async function flushQueuedCandidates(){
  if(!peerConnection) return;
  const queue = queuedRemoteCandidates;
  queuedRemoteCandidates = [];
  for(const candidate of queue){
    try{
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    }catch(err){
      console.error("Queued ICE candidate error", err);
    }
  }
}

const callOverlay = document.getElementById("callOverlay");
const callStatus = document.getElementById("callStatus");
const localVideoWrap = document.getElementById("localVideoWrap");
const localVideoEl = document.getElementById("localVideo");
const remoteVideoEl = document.getElementById("remoteVideo");
const incomingBanner = document.getElementById("incomingCallBanner");
const incomingText = document.getElementById("incomingCallText");
const muteBtn = document.getElementById("muteBtn");
const camBtn = document.getElementById("camBtn");
const switchCamBtn = document.getElementById("switchCamBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");

function createPeerConnection(){
  const pc = new RTCPeerConnection(ICE_SERVERS);

  pc.onicecandidate = (e) => {
    if(e.candidate){
      socket.emit("ice-candidate", e.candidate);
    }
  };

  pc.ontrack = (e) => {
    if(remoteVideoEl.srcObject !== e.streams[0]){
      remoteVideoEl.srcObject = e.streams[0];
    }
    // Explicitly (re)start playback. Assigning srcObject alone relies on the
    // "autoplay" attribute, and browsers can block autoplay of media that
    // has audio if they don't think there was a recent enough user gesture.
    // Since the button tap that started/accepted the call already counts as
    // a gesture this normally succeeds, but we still call play() ourselves
    // and swallow/log any rejection instead of leaving the element silently
    // stuck paused with a black frame.
    const playPromise = remoteVideoEl.play();
    if(playPromise && playPromise.catch){
      playPromise.catch(err => console.warn("Remote play() blocked:", err));
    }
    callStatus.innerText = "Connected";
  };

  pc.oniceconnectionstatechange = () => {
    console.log("ICE connection state:", pc.iceConnectionState);
  };

  pc.onconnectionstatechange = () => {
    console.log("Connection state:", pc.connectionState);
    if(pc.connectionState === "disconnected" || pc.connectionState === "failed"){
      cleanupCall();
    }
  };

  return pc;
}

async function startCall(type){
  pendingCallType = type;
  isCaller = true;
  remoteDescriptionSet = false;
  queuedRemoteCandidates = [];

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video: type === "video",
      audio: true
    });
  }catch(err){
    alert("Could not access camera/mic: " + err.message);
    return;
  }

  showCallOverlay(type);
  localVideoEl.srcObject = localStream;
  callStatus.innerText = "Calling...";

  peerConnection = createPeerConnection();
  localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("call-user", { offer, callType: type });
}

socket.on("incoming-call", (data) => {
  if(peerConnection){
    // already in a call, auto-reject
    socket.emit("reject-call");
    return;
  }
  pendingOffer = data.offer;
  pendingCallType = data.callType;
  remoteDescriptionSet = false;
  queuedRemoteCandidates = [];
  incomingText.innerText = (data.callType === "video" ? "🎥 Incoming video call..." : "📞 Incoming voice call...");
  incomingBanner.style.display = "block";
});

async function acceptCall(){
  incomingBanner.style.display = "none";
  isCaller = false;

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video: pendingCallType === "video",
      audio: true
    });
  }catch(err){
    alert("Could not access camera/mic: " + err.message);
    socket.emit("reject-call");
    return;
  }

  showCallOverlay(pendingCallType);
  localVideoEl.srcObject = localStream;
  callStatus.innerText = "Connecting...";

  peerConnection = createPeerConnection();
  localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

  await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingOffer));
  remoteDescriptionSet = true;
  await flushQueuedCandidates();

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("make-answer", { answer });
  pendingOffer = null;
}

function rejectCall(){
  incomingBanner.style.display = "none";
  pendingOffer = null;
  remoteDescriptionSet = false;
  queuedRemoteCandidates = [];
  socket.emit("reject-call");
}

socket.on("answer-made", async (data) => {
  if(peerConnection){
    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    remoteDescriptionSet = true;
    await flushQueuedCandidates();
    // NOTE: this only means the SDP answer was received, not that media is
    // actually flowing yet — real connectivity is reflected by
    // pc.connectionState / pc.iceConnectionState (see console logs) and by
    // ontrack firing, which updates this same status text again.
    callStatus.innerText = "Connected";
  }
});

socket.on("ice-candidate", async (candidate) => {
  // If we don't have a peer connection yet (e.g. we haven't tapped
  // "Accept" yet) or we have one but haven't set the remote description
  // yet (e.g. the answer/offer hasn't arrived or finished applying),
  // addIceCandidate() would throw. Queue it and replay once ready instead
  // of losing it — this was the main reason media never connected.
  if(peerConnection && remoteDescriptionSet){
    try{
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    }catch(err){
      console.error("ICE candidate error", err);
    }
  }else{
    queuedRemoteCandidates.push(candidate);
  }
});

socket.on("call-rejected", () => {
  callStatus.innerText = "Call declined";
  setTimeout(cleanupCall, 1200);
});

socket.on("call-ended", () => {
  callStatus.innerText = "Call ended";
  setTimeout(cleanupCall, 800);
});

async function showCallOverlay(type){
  callOverlay.style.display = "block";

  const isVideo = type === "video";
  localVideoWrap.style.display = isVideo ? "block" : "none";
  camBtn.style.display = isVideo ? "flex" : "none";

  // Reset per-call state
  isCameraOff = false;
  camBtn.textContent = "📷";
  camBtn.classList.remove("active-off");
  localVideoWrap.classList.remove("cam-off");

  // Only show "switch camera" if it's a video call and more than one camera exists
  switchCamBtn.style.display = "none";
  if(isVideo){
    try{
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === "videoinput");
      canSwitchCamera = cams.length > 1;
      switchCamBtn.style.display = canSwitchCamera ? "flex" : "none";
    }catch(err){
      canSwitchCamera = false;
    }
  }
}

function endCall(){
  socket.emit("end-call");
  cleanupCall();
}

function toggleMute(){
  if(!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  muteBtn.innerText = isMuted ? "🔇" : "🎤";
  muteBtn.classList.toggle("active-off", isMuted);
}

// Turns the outgoing video track on/off without touching the call itself
function toggleCamera(){
  if(!localStream) return;
  isCameraOff = !isCameraOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCameraOff);
  camBtn.textContent = isCameraOff ? "🚫" : "📷";
  camBtn.classList.toggle("active-off", isCameraOff);
  localVideoWrap.classList.toggle("cam-off", isCameraOff);
}

// Switches between front/rear camera mid-call using replaceTrack so the
// existing peer connection stays alive (no renegotiation/reconnect needed)
async function switchCamera(){
  if(!localStream || !peerConnection || !canSwitchCamera) return;

  const nextFacing = currentFacingMode === "user" ? "environment" : "user";

  try{
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: nextFacing } },
      audio: false
    });

    const newVideoTrack = newStream.getVideoTracks()[0];
    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === "video");

    if(sender && sender.replaceTrack){
      await sender.replaceTrack(newVideoTrack);
    }

    // Stop the old video track and swap it into localStream
    const oldVideoTrack = localStream.getVideoTracks()[0];
    if(oldVideoTrack){
      localStream.removeTrack(oldVideoTrack);
      oldVideoTrack.stop();
    }
    localStream.addTrack(newVideoTrack);
    newVideoTrack.enabled = !isCameraOff;

    localVideoEl.srcObject = localStream;
    currentFacingMode = nextFacing;
  }catch(err){
    alert("Could not switch camera: " + err.message);
  }
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    (callOverlay.requestFullscreen ? callOverlay.requestFullscreen() : Promise.resolve()).catch(() => {});
  }else{
    document.exitFullscreen && document.exitFullscreen().catch(() => {});
  }
}

function cleanupCall(){
  if(peerConnection){
    peerConnection.close();
    peerConnection = null;
  }
  if(localStream){
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  localVideoEl.srcObject = null;
  remoteVideoEl.srcObject = null;

  if(document.fullscreenElement){
    document.exitFullscreen && document.exitFullscreen().catch(() => {});
  }

  callOverlay.style.display = "none";
  incomingBanner.style.display = "none";

  isMuted = false;
  muteBtn.innerText = "🎤";
  muteBtn.classList.remove("active-off");

  isCameraOff = false;
  camBtn.textContent = "📷";
  camBtn.classList.remove("active-off");
  localVideoWrap.classList.remove("cam-off");

  currentFacingMode = "user";
  pendingOffer = null;
  isCaller = false;

  remoteDescriptionSet = false;
  queuedRemoteCandidates = [];
}
</script>
